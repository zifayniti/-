<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Живая нить — история</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=YOUR_API_KEY_HERE&lang=ru_RU"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap&subset=cyrillic,cyrillic-ext" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .admin-buttons { margin-top: 20px; display: flex; gap: 20px; justify-content: center; }
        .approve { background: #7D9D6E; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
        .reject { background: #C28163; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header>
            <div class="header-top">
                <a href="map.html" class="home-link"><i class="fas fa-arrow-left"></i> К карте</a>
            </div>
            <h1><i class="fas fa-tree"></i> Живая нить</h1>
        </header>
        <main class="story-container" id="story-container"></main>
        <div id="save-panel">
            <button class="btn-small" onclick="window.location='map.html'">← Вернуться к карте</button>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const storyId = params.get('id');
        const container = document.getElementById('story-container');

        function getStories() {
            const saved = localStorage.getItem('zhivaya-nit-stories');
            return saved ? JSON.parse(saved) : [];
        }

        function saveStories(stories) {
            localStorage.setItem('zhivaya-nit-stories', JSON.stringify(stories));
        }

        let stories = getStories();
        const story = stories.find(s => String(s.id) === String(storyId));

        if (!story) {
            container.innerHTML = '<p class="error">История не найдена</p>';
        } else {
            renderStory(story);
        }

        function renderStory(story) {
            const isAdmin = sessionStorage.getItem('admin') === 'true';
            container.innerHTML = `
                <h2>${escapeHtml(story.title)}</h2>
                <div class="story-meta">
                    <span><i class="fas fa-user"></i> ${escapeHtml(story.author)}</span>
                    <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(story.place) || 'Не указано'}</span>
                    <span><i class="fas fa-calendar-alt"></i> ${new Date(story.date).toLocaleDateString('ru-RU')}</span>
                </div>
                <div id="story-map"></div>
                <div class="story-text">${escapeHtml(story.text).replace(/\n/g, '<br>')}</div>
                ${story.photo ? `<img src="${story.photo}" class="story-photo">` : ''}
                ${(!story.approved && isAdmin) ? `
                    <div class="admin-buttons">
                        <button id="approve-btn" class="approve">✅ Одобрить историю</button>
                        <button id="reject-btn" class="reject">❌ Отклонить историю</button>
                    </div>
                ` : ''}
            `;

            if (story.coords && window.ymaps) {
                ymaps.ready(() => {
                    const map = new ymaps.Map('story-map', {
                        center: story.coords,
                        zoom: 15,
                        controls: ['zoomControl']
                    });
                    const placemark = new ymaps.Placemark(story.coords, {
                        balloonContent: story.title,
                        hintContent: story.title
                    }, { preset: 'islands#redDotIcon' });
                    map.geoObjects.add(placemark);
                    placemark.balloon.open();
                });
            }

            if (!story.approved && isAdmin) {
                document.getElementById('approve-btn')?.addEventListener('click', () => {
                    story.approved = true;
                    saveStories(stories);
                    alert('История одобрена и опубликована');
                    window.location.reload();
                });
                document.getElementById('reject-btn')?.addEventListener('click', () => {
                    const updated = stories.filter(s => s.id !== story.id);
                    saveStories(updated);
                    alert('История отклонена и удалена');
                    window.location.href = 'map.html';
                });
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
    </script>
</body>
</html>
