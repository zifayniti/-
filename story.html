<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Живая нить — история</title>
    <!-- Яндекс.Карты API (ЗАМЕНИТЕ КЛЮЧ) -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=b6e4b3a1-81ae-4380-98f1-2ff26b67f41b&lang=ru_RU"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap&subset=cyrillic,cyrillic-ext" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>

        .story-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        #story-map {
            width: 100% !important;
            height: 400px !important;
            min-height: 400px;
            border-radius: 24px;
            margin: 20px 0;
            border: 2px solid #E1C6A8;
            background: #f0f0f0;
            clear: both;
            display: block;
            position: relative;
            z-index: 1;
        }
        /* Убираем возможные конфликты */
        .story-text {
            margin-top: 20px;
            clear: both;
            position: relative;
            z-index: 2;
        }
        .debug-info {
            background: #eef;
            padding: 10px;
            border-radius: 8px;
            margin: 20px 0;
            font-family: monospace;
            white-space: pre-wrap;
            clear: both;
        }
        .error { color: #c62828; padding: 1rem; background: #ffeae5; border-radius: 16px; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header>
            <div class="header-top">
                <a href="map.html" class="home-link"><i class="fas fa-arrow-left"></i> К карте</a>
            </div>
            <h1><i class="fas fa-tree"></i> Живая нить</h1>
        </header>

        <main class="story-container" id="story-container">
            <!-- Динамическая загрузка -->
        </main>

        <div id="save-panel">
            <button class="btn-small" onclick="window.location='map.html'">← Вернуться к карте</button>
        </div>
    </div>

    <script>
        (function() {
            const container = document.getElementById('story-container');
            const params = new URLSearchParams(window.location.search);
            const storyId = params.get('id');
            let debugHtml = '';

            function addDebug(msg, isError = false) {
                debugHtml += `<div style="color: ${isError ? 'red' : 'green'};">${msg}</div>`;
            }

            addDebug('=== Начало отладки ===');

            if (!storyId) {
                container.innerHTML = '<p class="error">Не указан ID истории</p>';
                return;
            }
            addDebug(`✅ ID истории: ${storyId}`);

            let saved;
            try {
                saved = localStorage.getItem('zhivaya-nit-stories');
                addDebug(saved ? '✅ localStorage содержит данные' : '❌ localStorage пуст');
            } catch (e) {
                addDebug(`❌ Ошибка localStorage: ${e.message}`, true);
            }

            if (!saved) {
                container.innerHTML = `<div class="debug-info">${debugHtml}</div><p class="error">Нет данных. Сначала откройте карту.</p>`;
                return;
            }

            let stories, story;
            try {
                stories = JSON.parse(saved);
                addDebug(`✅ Загружено историй: ${stories.length}`);
                story = stories.find(s => String(s.id) === String(storyId));
                if (story) {
                    addDebug(`✅ История найдена: "${story.title}"`);
                } else {
                    addDebug(`❌ История с ID ${storyId} не найдена`, true);
                }
            } catch (e) {
                addDebug(`❌ Ошибка JSON: ${e.message}`, true);
            }

            if (!story) {
                container.innerHTML = `<div class="debug-info">${debugHtml}</div><p class="error">История не найдена</p>`;
                return;
            }

            // Проверка координат
            if (!story.coords || !Array.isArray(story.coords) || story.coords.length !== 2) {
                addDebug('❌ Некорректные координаты', true);
            } else {
                addDebug(`✅ Координаты: [${story.coords.join(', ')}]`);
            }

            // Отображаем историю (без карты пока, она будет создана ниже)
            container.innerHTML = `
                <h2>${escapeHtml(story.title)}</h2>
                <div class="story-meta">
                    <span><i class="fas fa-user"></i> ${escapeHtml(story.author)}</span>
                    <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(story.place) || 'Не указано'}</span>
                    <span><i class="fas fa-calendar-alt"></i> ${new Date(story.date).toLocaleDateString('ru-RU')}</span>
                </div>
                <div id="story-map"></div>
                <div class="story-text">${escapeHtml(story.text).replace(/\n/g, '<br>')}</div>
                ${story.photo ? `<img src="${story.photo}" class="story-photo">` : ''}
                <div class="debug-info">${debugHtml}</div>
            `;

            // Создание карты
            const mapContainer = document.getElementById('story-map');
            if (!mapContainer) {
                console.error('Контейнер карты не найден');
                return;
            }

            if (typeof ymaps === 'undefined') {
                mapContainer.innerHTML = '<p class="error">❌ API Яндекс.Карт не загружен</p>';
                return;
            }

            // Проверяем координаты ещё раз
            if (!story.coords || !Array.isArray(story.coords) || story.coords.length !== 2) {
                mapContainer.innerHTML = '<p class="error">❌ Некорректные координаты</p>';
                return;
            }

            // Инициализация карты с принудительным обновлением размеров
            ymaps.ready(() => {
                try {
                    const map = new ymaps.Map('story-map', {
                        center: story.coords,
                        zoom: 15,
                        controls: ['zoomControl']
                    });

                    const placemark = new ymaps.Placemark(story.coords, {
                        balloonContent: story.title,
                        hintContent: story.title
                    }, {
                        preset: 'islands#redDotIcon'
                    });

                    map.geoObjects.add(placemark);
                    placemark.balloon.open();

                    // Принудительно обновляем размер карты (на случай, если контейнер ещё не отрисован)
                    setTimeout(() => {
                        map.container.fitToViewport();
                        addDebug('✅ Карта успешно создана и обновлена');
                        // Обновим отладочный блок
                        const debugDiv = document.querySelector('.debug-info');
                        if (debugDiv) {
                            debugDiv.innerHTML += '<div style="color:green;">✅ Карта успешно создана и обновлена</div>';
                        }
                    }, 100);
                } catch (e) {
                    console.error('Ошибка создания карты:', e);
                    mapContainer.innerHTML = `<p class="error">❌ Ошибка: ${e.message}</p>`;
                }
            });

        })();

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    </script>
</body>
</html>
